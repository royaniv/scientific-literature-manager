<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Organizer</title>
<style>
/* ── Reset & base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f8fafc;
  --surface: #ffffff;
  --border:  #e2e8f0;
  --text:    #1e293b;
  --muted:   #64748b;
  --accent:  #2563eb;

  --cat-Micelles:   #2563eb;
  --cat-Chiral:     #7c3aed;
  --cat-Soup:       #ea580c;
  --cat-Astro:      #0369a1;
  --cat-Light:      #b45309;
  --cat-OrganBactr: #15803d;
  --cat-General:    #64748b;
}
body { font: 14px/1.6 "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
a   { color: var(--accent); text-decoration: none; }

/* ── Top bar ───────────────────────────────────────────────────── */
.topbar {
  background: #1b2d4f;
  padding: 0 28px;
  display: flex; align-items: center; gap: 12px;
  height: 52px; position: sticky; top: 0; z-index: 100;
}
.topbar h1 { color: #e2e8f0; font-size: 16px; font-weight: 700; flex: 0 0 auto; margin-right: 16px; }
.topbar input[type=text] {
  flex: 1; padding: 6px 12px;
  background: #243d64; border: 1px solid #2a4a7a; border-radius: 6px;
  color: #e2e8f0; font: inherit;
}
.topbar input[type=text]::placeholder { color: #8faac8; }
.topbar input:focus { outline: none; border-color: var(--accent); }
.topbar label { color: #8faac8; font-size: 12px; white-space: nowrap; }
.topbar .sep  { width: 1px; height: 28px; background: #2a4a7a; flex-shrink: 0; }

/* ── Settings panel (expandable) ──────────────────────────────── */
.settings-bar {
  background: #f1f5f9; border-bottom: 1px solid var(--border);
  padding: 10px 28px; display: flex; gap: 20px; align-items: center;
  flex-wrap: wrap;
}
.settings-bar label   { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.settings-bar input   { padding: 4px 8px; border: 1px solid var(--border); border-radius: 5px; font: inherit; width: 80px; }
.settings-bar input[type=checkbox] { width: auto; accent-color: var(--accent); }
.settings-bar .wide   { width: 360px; }

/* ── Action buttons ────────────────────────────────────────────── */
.btn {
  padding: 8px 20px; border: none; border-radius: 6px;
  font: 600 13px/1 inherit; cursor: pointer; transition: background .15s;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { background: #94a3b8; cursor: default; }
.btn-success { background: #15803d; color: #fff; }
.btn-success:hover { background: #166534; }
.btn-success:disabled { background: #94a3b8; cursor: default; }
.btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }

/* ── Progress bar ──────────────────────────────────────────────── */
.progress-wrap { padding: 8px 28px; display: none; }
.progress-wrap.visible { display: block; }
.progress-track {
  height: 5px; background: var(--border); border-radius: 4px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--accent); width: 0; transition: width .2s; }
.progress-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Category pill filter bar ──────────────────────────────────── */
.pill-bar {
  padding: 12px 28px 0; display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.pill {
  padding: 4px 14px; border-radius: 20px; border: 2px solid;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s;
  user-select: none;
}
.pill:hover   { opacity: .85; }
.pill.active  { color: #fff; }

.pill[data-cat="All"]        { border-color: #475569; color: #475569; }
.pill[data-cat="All"].active { background: #475569; }

.pill[data-cat="Micelles"]        { border-color: var(--cat-Micelles); color: var(--cat-Micelles); }
.pill[data-cat="Micelles"].active { background: var(--cat-Micelles); }

.pill[data-cat="Chiral"]        { border-color: var(--cat-Chiral); color: var(--cat-Chiral); }
.pill[data-cat="Chiral"].active { background: var(--cat-Chiral); }

.pill[data-cat="Soup"]        { border-color: var(--cat-Soup); color: var(--cat-Soup); }
.pill[data-cat="Soup"].active { background: var(--cat-Soup); }

.pill[data-cat="Astro"]        { border-color: var(--cat-Astro); color: var(--cat-Astro); }
.pill[data-cat="Astro"].active { background: var(--cat-Astro); }

.pill[data-cat="Light"]        { border-color: var(--cat-Light); color: var(--cat-Light); }
.pill[data-cat="Light"].active { background: var(--cat-Light); }

.pill[data-cat="OrganBactr"]        { border-color: var(--cat-OrganBactr); color: var(--cat-OrganBactr); }
.pill[data-cat="OrganBactr"].active { background: var(--cat-OrganBactr); }

.pill[data-cat="General"]        { border-color: var(--cat-General); color: var(--cat-General); }
.pill[data-cat="General"].active { background: var(--cat-General); }

/* ── Summary strip ─────────────────────────────────────────────── */
.summary-strip {
  padding: 10px 28px; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 20px;
}
.summary-strip strong { color: var(--text); }

/* ── Card grid ─────────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  padding: 16px 28px 40px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }

/* coloured left accent bar */
.card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.card[data-cat="Micelles"]::before   { background: var(--cat-Micelles); }
.card[data-cat="Chiral"]::before     { background: var(--cat-Chiral); }
.card[data-cat="Soup"]::before       { background: var(--cat-Soup); }
.card[data-cat="Astro"]::before      { background: var(--cat-Astro); }
.card[data-cat="Light"]::before      { background: var(--cat-Light); }
.card[data-cat="OrganBactr"]::before { background: var(--cat-OrganBactr); }
.card[data-cat="General"]::before    { background: var(--cat-General); }

.card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 8px; margin-bottom: 8px;
}
.card-source {
  font-size: 11px; color: var(--muted); font-family: "Consolas", monospace;
  word-break: break-all; flex: 1;
}
.card-star { color: #ef4444; font-size: 15px; flex-shrink: 0; }

.card-newname {
  font-size: 12px; font-weight: 600; color: var(--text);
  word-break: break-all; margin-bottom: 8px;
  font-family: "Consolas", monospace;
}

.card-meta {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.badge {
  padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700;
  color: #fff;
}
.badge-Micelles   { background: var(--cat-Micelles); }
.badge-Chiral     { background: var(--cat-Chiral); }
.badge-Soup       { background: var(--cat-Soup); }
.badge-Astro      { background: var(--cat-Astro); }
.badge-Light      { background: var(--cat-Light); }
.badge-OrganBactr { background: var(--cat-OrganBactr); }
.badge-General    { background: var(--cat-General); }

.card-status-done   { color: #15803d; font-size: 11px; font-weight: 700; }
.card-status-failed { color: #dc2626; font-size: 11px; }

/* card edit hint */
.card-edit {
  position: absolute; bottom: 10px; right: 12px;
  font-size: 11px; color: var(--muted); opacity: 0;
  transition: opacity .15s; cursor: pointer;
}
.card:hover .card-edit { opacity: 1; }

/* ── Empty state ───────────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 340px; color: var(--muted); gap: 14px;
}
.empty-state svg { width: 56px; height: 56px; opacity: .3; }
.empty-state p   { font-size: 15px; }

/* ── Toast ─────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1e293b; color: #e2e8f0;
  padding: 12px 20px; border-radius: 8px;
  font-size: 13px; max-width: 340px;
  box-shadow: 0 6px 24px rgba(0,0,0,.25);
  transition: opacity .3s; opacity: 0; pointer-events: none;
}
.toast.visible { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────────── -->
<div class="topbar">
  <h1>Paper Organizer</h1>
  <label>Source</label>
  <input id="srcDir" type="text" placeholder="C:\Users\you\Downloads\papers">
  <label>Output</label>
  <input id="outDir" type="text" placeholder="(defaults to source/organized_papers)">
  <div class="sep"></div>
  <button class="btn btn-primary" id="btnScan">Scan</button>
  <button class="btn btn-success" id="btnApply" disabled>Apply</button>
  <button class="btn btn-ghost"   id="btnClear">Clear</button>
</div>

<!-- ── Settings row ─────────────────────────────────────────────── -->
<div class="settings-bar">
  <label>Prefix <input id="cfgPrefix" type="text" value="CB" style="width:60px"></label>
  <label>Digits <input id="cfgDigits" type="number" value="3" min="1" max="8" style="width:56px"></label>
  <label>Start  <input id="cfgStart"  type="number" value="1" min="1" style="width:56px"></label>
  <label class="wide">Template <input id="cfgTemplate" type="text"
    value="{id} {author}, {title}, {journal} {year_short}.pdf" class="wide"></label>
  <label><input id="cfgRecursive"   type="checkbox" checked> Subfolders</label>
  <label><input id="cfgSortFolders" type="checkbox"> Category folders</label>
  <label><input id="cfgCopy"        type="checkbox" checked> Keep originals (copy)</label>
</div>

<!-- ── Progress ─────────────────────────────────────────────────── -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Scanning…</div>
</div>

<!-- ── Pill filter bar ──────────────────────────────────────────── -->
<div class="pill-bar" id="pillBar">
  <span class="pill active" data-cat="All">All <span class="pill-count" data-for="All">0</span></span>
  {% for cat in categories %}
  <span class="pill" data-cat="{{ cat }}">{{ cat }} <span class="pill-count" data-for="{{ cat }}">0</span></span>
  {% endfor %}
</div>

<!-- ── Summary strip ────────────────────────────────────────────── -->
<div class="summary-strip" id="summaryStrip" style="display:none">
  <span id="summaryText"></span>
</div>

<!-- ── Card grid ────────────────────────────────────────────────── -->
<div id="cardGrid">
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
    </svg>
    <p>Enter a source folder above and click Scan.</p>
  </div>
  <div class="card-grid" id="cards"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let allPapers    = [];
let activeFilter = "All";
let currentToken = null;

// ── Element shortcuts ───────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = {
  srcDir:       $("srcDir"),
  outDir:       $("outDir"),
  btnScan:      $("btnScan"),
  btnApply:     $("btnApply"),
  btnClear:     $("btnClear"),
  progressWrap: $("progressWrap"),
  progressFill: $("progressFill"),
  progressLabel:$("progressLabel"),
  pillBar:      $("pillBar"),
  summaryStrip: $("summaryStrip"),
  summaryText:  $("summaryText"),
  cards:        $("cards"),
  emptyState:   $("emptyState"),
  toast:        $("toast"),
  cfgPrefix:    $("cfgPrefix"),
  cfgDigits:    $("cfgDigits"),
  cfgStart:     $("cfgStart"),
  cfgTemplate:  $("cfgTemplate"),
  cfgRecursive: $("cfgRecursive"),
  cfgSortFolders:$("cfgSortFolders"),
  cfgCopy:      $("cfgCopy"),
};

// ── Category colours ────────────────────────────────────────────────────────
const CAT_COLORS = {
  All:        "#475569",
  Micelles:   "#2563eb",
  Chiral:     "#7c3aed",
  Soup:       "#ea580c",
  Astro:      "#0369a1",
  Light:      "#b45309",
  OrganBactr: "#15803d",
  General:    "#64748b",
};

// ── Scan ────────────────────────────────────────────────────────────────────
el.btnScan.addEventListener("click", async () => {
  const src = el.srcDir.value.trim();
  if (!src) { toast("Enter a source folder path."); return; }
  clearAll();
  showProgress(true);
  el.btnScan.disabled = true;

  const body = {
    source:            src,
    output:            el.outDir.value.trim(),
    prefix:            el.cfgPrefix.value.trim() || "CB",
    digits:            parseInt(el.cfgDigits.value) || 3,
    start:             parseInt(el.cfgStart.value)  || 1,
    template:          el.cfgTemplate.value.trim(),
    recursive:         el.cfgRecursive.checked,
    sort_into_folders: el.cfgSortFolders.checked,
  };

  const r = await fetch("/scan", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  if (!r.ok) { const e = await r.json(); toast("Error: " + (e.error||r.status)); el.btnScan.disabled=false; return; }
  const { token } = await r.json();
  currentToken = token;

  const es = new EventSource(`/progress/${token}`);
  es.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.event === "progress") {
      const pct = msg.data.total ? Math.round((msg.data.i / msg.data.total) * 100) : 0;
      setProgress(pct, `${msg.data.i}/${msg.data.total}  ${msg.data.name || ""}`);
    } else if (msg.event === "done") {
      es.close();
      showProgress(false);
      el.btnScan.disabled = false;
      if (!msg.data.count) { toast("No PDF files found in that folder."); return; }
      allPapers = msg.data.papers;
      renderAll();
      el.btnApply.disabled = false;
    } else if (msg.event === "error") {
      es.close();
      showProgress(false);
      el.btnScan.disabled = false;
      toast("Scan error: " + msg.data.message);
    }
  };
  es.onerror = () => { es.close(); showProgress(false); el.btnScan.disabled = false; };
});

// ── Apply ───────────────────────────────────────────────────────────────────
el.btnApply.addEventListener("click", async () => {
  el.btnApply.disabled = true;
  const r = await fetch("/apply", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({copy: el.cfgCopy.checked})});
  const data = await r.json();
  if (!r.ok) { toast("Error: " + (data.error || r.status)); el.btnApply.disabled=false; return; }
  allPapers = data.papers;
  renderAll();
  toast(`Done: ${data.done} succeeded${data.failed ? ", " + data.failed + " failed" : ""}.`);
});

// ── Clear ───────────────────────────────────────────────────────────────────
el.btnClear.addEventListener("click", clearAll);

function clearAll() {
  allPapers = []; currentToken = null;
  renderAll(); el.btnApply.disabled = true;
  showProgress(false); setProgress(0, "");
  updateSummary([]);
}

// ── Pill filter ──────────────────────────────────────────────────────────────
el.pillBar.addEventListener("click", e => {
  const pill = e.target.closest(".pill");
  if (!pill) return;
  el.pillBar.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  pill.classList.add("active");
  activeFilter = pill.dataset.cat;
  renderCards();
});

// ── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  updatePillCounts();
  updateSummary(allPapers);
  renderCards();
}

function renderCards() {
  const list = activeFilter === "All"
    ? allPapers
    : allPapers.filter(p => p.category === activeFilter);

  el.cards.innerHTML = "";
  if (!list.length) {
    el.emptyState.style.display = "";
    el.summaryStrip.style.display = "none";
    return;
  }
  el.emptyState.style.display = "none";
  el.summaryStrip.style.display = "";

  list.forEach(paper => el.cards.appendChild(makeCard(paper)));
}

function makeCard(paper) {
  const div = document.createElement("div");
  div.className = "card";
  div.dataset.cat = paper.category;

  const high       = paper.priority === "high";
  const isDone     = paper.state === "DONE";
  const isFailed   = paper.state === "FAILED";
  const isPlanned  = paper.state === "PLANNED";

  const statusHtml = isDone
    ? `<span class="card-status-done">✓ Done</span>`
    : isFailed
    ? `<span class="card-status-failed">✕ ${paper.error || "Failed"}</span>`
    : isPlanned
    ? `<span style="color:var(--muted);font-size:11px">Preview</span>`
    : "";

  div.innerHTML = `
    <div class="card-header">
      <span class="card-source">${escHtml(paper.source.replace(/.*[/\\]/, ""))}</span>
      ${high ? '<span class="card-star" title="High priority">★</span>' : ""}
    </div>
    <div class="card-newname">${escHtml(paper.new_name || "—")}</div>
    <div class="card-meta">
      <span class="badge badge-${paper.category}">${escHtml(paper.category)}</span>
      ${statusHtml}
      ${paper.doi ? `<span style="font-size:10px;color:var(--muted)">DOI</span>` : ""}
    </div>
    ${isPlanned ? `<span class="card-edit" title="Year: ${paper.year}  Journal: ${paper.journal}">${escHtml(paper.year)} · ${escHtml(paper.journal)}</span>` : ""}
  `;
  return div;
}

function updatePillCounts() {
  const counts = {};
  allPapers.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
  el.pillBar.querySelectorAll(".pill-count").forEach(span => {
    const cat = span.dataset.for;
    span.textContent = cat === "All" ? allPapers.length : (counts[cat] || 0);
  });
}

function updateSummary(papers) {
  if (!papers.length) { el.summaryStrip.style.display = "none"; return; }
  const done   = papers.filter(p => p.state === "DONE").length;
  const failed = papers.filter(p => p.state === "FAILED").length;
  const plan   = papers.filter(p => p.state === "PLANNED").length;
  let txt = `<strong>${papers.length}</strong> papers`;
  if (plan)   txt += ` · <strong>${plan}</strong> planned`;
  if (done)   txt += ` · <strong style="color:#15803d">${done} done</strong>`;
  if (failed) txt += ` · <strong style="color:#dc2626">${failed} failed</strong>`;
  el.summaryText.innerHTML = txt;
  el.summaryStrip.style.display = "";
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function showProgress(show) {
  el.progressWrap.classList.toggle("visible", show);
}
function setProgress(pct, label) {
  el.progressFill.style.width = pct + "%";
  el.progressLabel.textContent = label;
}

let _toastTimer;
function toast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add("visible");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.toast.classList.remove("visible"), 4000);
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
</script>
</body>
</html>
