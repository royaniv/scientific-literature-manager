<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Paper Organizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 370px; margin: 0;
      font: 13px/1.5 "Segoe UI", system-ui, sans-serif;
      background: #16243e; color: #e2e8f0;
    }
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #243d64;
    }
    .header h1 { margin: 0; font-size: 15px; color: #fff; }
    .header p  { margin: 2px 0 0; font-size: 11px; color: #8faac8; }
    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .field label {
      display: block; font-size: 10px; font-weight: 700;
      color: #8faac8; text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 6px 8px;
      background: #243d64; color: #e2e8f0;
      border: 1px solid #2a4a7a; border-radius: 5px;
      font: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #3b82f6;
    }
    .field textarea { min-height: 50px; resize: vertical; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .check { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #94a3b8; }
    .check input { width: auto; accent-color: #3b82f6; }
    .hint  { font-size: 10px; color: #64748b; margin-top: 3px; }
    .divider { height: 1px; background: #243d64; margin: 2px 0; }
    .preview-box {
      background: #0f1d33; border: 1px solid #2a4a7a;
      border-radius: 5px; padding: 8px 10px;
      font: 12px/1.4 "Consolas", monospace; color: #7dd3fc;
      word-break: break-all; min-height: 32px;
    }
    button.download {
      width: 100%; padding: 10px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      font: 700 13px/1 inherit; cursor: pointer;
    }
    button.download:hover   { background: #1d4ed8; }
    button.download:disabled { background: #334155; cursor: not-allowed; }
    #status { font-size: 11px; color: #64748b; min-height: 16px; }
    .cat-badge {
      display: inline-block; padding: 1px 7px;
      background: #1e3a5f; border-radius: 12px;
      font-size: 11px; color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Paper Organizer</h1>
    <p>Save &amp; name this article PDF</p>
  </div>
  <div class="body">
    <div class="field">
      <label>PDF URL</label>
      <input id="pdfUrl" type="url" placeholder="Detected automatically">
    </div>
    <div class="field">
      <label>Title</label>
      <textarea id="title"></textarea>
    </div>
    <div class="row3">
      <div class="field"><label>Last author</label><input id="author"></div>
      <div class="field"><label>Journal</label><input id="journal"></div>
      <div class="field"><label>Year</label><input id="year" maxlength="4"></div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Category</label>
        <select id="category"></select>
      </div>
      <div class="field">
        <label>Detected</label>
        <div style="padding-top:6px"><span id="catBadge" class="cat-badge">—</span></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="row3">
      <div class="field"><label>Prefix</label><input id="prefix"></div>
      <div class="field"><label>Number</label><input id="nextNumber" type="number" min="1"></div>
      <div class="field"><label>Digits</label><input id="digits" type="number" min="1" max="8"></div>
    </div>
    <div class="field">
      <label>Downloads subfolder</label>
      <input id="subfolder" placeholder="organized_papers">
      <p class="hint">Chrome saves inside the browser Downloads folder. Use a subfolder name.</p>
    </div>
    <div class="check">
      <input id="saveAs" type="checkbox">
      <label for="saveAs">Show Save As dialog</label>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Filename preview</label>
      <div id="filenamePreview" class="preview-box">—</div>
    </div>
    <button class="download" id="downloadBtn">Download with this name</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
