<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SLM{% endblock %} — Scientific Literature Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <nav class="nav">
      <a class="nav-brand" href="{{ url_for('slm.index') }}">SLM</a>
      <span class="nav-sub">Scientific Literature Manager</span>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>slm &mdash; from-scratch rebuild</p>
  </footer>
</body>
</html>
